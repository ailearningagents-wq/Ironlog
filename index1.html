<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0D0D0D"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="IronLog"/>
<meta name="description" content="5-Day Double Stimulus Workout Tracker"/>
<title>IronLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>

<!-- Inline SVG icon as data URI for manifest -->
<link rel="manifest" id="manifest-link"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0D0D;--surface:#111;--surface2:#161616;--surface3:#1e1e1e;
  --border:#222;--border2:#2a2a2a;
  --text:#F0EDE8;--text2:#aaa;--text3:#666;--text4:#444;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden}
button{font-family:var(--font-body);cursor:pointer}
input,textarea{font-family:var(--font-body)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* ── App Shell ── */
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
#topbar{
  position:sticky;top:0;z-index:200;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0px) 0 0;
}
#topbar-inner{padding:14px 16px 0}
#topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.app-title{font-family:var(--font-display);font-size:26px;font-weight:900;letter-spacing:0.04em;color:var(--text)}
.day-tabs{display:flex;overflow-x:auto;scrollbar-width:none;margin:0 -16px;padding:0 16px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;min-width:54px;padding:8px 8px 0;
  background:none;border:none;border-bottom:3px solid transparent;
  color:#555;font-family:var(--font-display);font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.day-tab.active{color:var(--day-color)}
.day-tab.active{border-color:var(--day-color)}
.tab-icon{font-size:18px;line-height:1}
.tab-num{font-size:13px;font-weight:800}
.tab-name{font-size:8px;color:inherit;opacity:.7}

/* ── Views ── */
#content{flex:1;overflow-y:auto;padding:16px 16px calc(80px + var(--safe-bottom))}
.max-w{max-width:540px;margin:0 auto}

/* ── Session Header ── */
.session-header{
  padding:16px;background:var(--surface2);
  border-radius:14px;border:1px solid var(--day-color-dim);margin-bottom:18px;
}
.sh-row{display:flex;align-items:center;gap:12px}
.sh-icon{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:var(--day-color-bg);border:2px solid var(--day-color-dim);
}
.sh-title{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:0.03em}
.sh-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
  background:var(--day-color-bg);color:var(--day-color);
  font-family:var(--font-display);letter-spacing:0.08em;margin-left:6px;
}
.sh-note{font-size:12px;color:var(--text3);margin-top:4px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin:12px 0 4px}
.progress-bar{height:5px;background:#222;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* ── Round ── */
.round-header{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.round-label{font-family:var(--font-display);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--day-color);white-space:nowrap}
.round-line{flex:1;height:1px;background:var(--border)}

/* ── Exercise Card ── */
.ex-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:10px;transition:border-color .2s;
}
.ex-card.complete{border-color:var(--day-color-dim);background:var(--day-color-bg2)}
.ex-thumb{position:relative;height:90px;overflow:hidden;background:#0a0a0a;cursor:pointer}
.ex-thumb img{width:100%;height:100%;object-fit:cover;opacity:.6;transition:opacity .2s}
.ex-thumb:active img{opacity:.85}
.thumb-overlay{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;gap:8px;
}
.play-btn{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  box-shadow:0 0 20px var(--day-color-glow);
}
.watch-label{font-size:10px;color:#fff;background:rgba(0,0,0,.65);padding:3px 10px;border-radius:20px}
.sets-badge{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.75);border-radius:8px;padding:2px 8px;
  font-size:10px;font-family:var(--font-display);letter-spacing:.06em;
}
.ex-body{padding:12px 14px}
.ex-name{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:.02em}
.ex-meta{font-size:11px;color:var(--text3);margin-top:2px;margin-bottom:10px}
.sets-headers{display:flex;gap:8px;padding-left:32px;margin-bottom:4px}
.sets-header{font-size:9px;color:var(--text4);letter-spacing:.1em;text-transform:uppercase}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.set-num{
  width:26px;height:26px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:var(--font-display);font-weight:700;
  background:var(--day-color-bg);border:1px solid var(--day-color-dim);color:var(--day-color);
}
.set-input{
  flex:1;background:#1a1a1a;border:1px solid var(--border2);
  border-radius:8px;padding:8px 10px;color:var(--text);
  font-size:14px;outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
.set-input:focus{border-color:var(--day-color-dim)}
.set-input::placeholder{color:#333}
.set-check{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  background:#1a1a1a;border:1px solid var(--border2);transition:all .15s;cursor:pointer;
  border:none;
}
.set-check.done{background:var(--day-color-bg);border:1px solid var(--day-color-dim)}

/* ── Notes ── */
.notes-section{margin-top:16px}
.section-label{font-size:10px;color:var(--text4);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.notes-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px;color:var(--text);font-size:13px;
  resize:none;outline:none;line-height:1.5;
  transition:border-color .15s;
}
.notes-input:focus{border-color:#333}
.notes-input::placeholder{color:#333}

/* ── Finish Btn ── */
.finish-btn{
  width:100%;margin-top:12px;padding:16px;border-radius:13px;
  font-family:var(--font-display);font-size:17px;font-weight:800;letter-spacing:.06em;
  border:1px solid var(--day-color);transition:all .3s;
}
.save-toast{
  margin-top:10px;text-align:center;font-size:13px;color:#4DCC88;
  padding:8px;background:#1a2a1a;border-radius:8px;border:1px solid #2a3a2a;
  display:none;
}
.save-toast.show{display:block}

/* ── History / PR views ── */
.back-btn{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
  border-radius:9px;padding:8px 14px;font-size:13px;letter-spacing:.02em;
}
.view-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:.03em}
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.filter-btn{
  padding:5px 12px;border-radius:20px;font-size:10px;
  font-family:var(--font-display);letter-spacing:.08em;text-transform:uppercase;
  background:var(--surface2);border:1px solid var(--border);color:var(--text3);
  transition:all .15s;
}
.filter-btn.active{background:var(--day-color-bg);border-color:var(--day-color-dim);color:var(--day-color)}
.history-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:10px;
}
.hc-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.hc-icon{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.hc-info{flex:1}
.hc-name{font-family:var(--font-display);font-size:15px;font-weight:700}
.hc-date{font-size:11px;color:var(--text3);margin-top:1px}
.hc-sets{text-align:right}
.hc-sets-count{font-family:var(--font-display);font-size:15px;font-weight:700}
.hc-sets-label{font-size:9px;color:var(--text4)}
.hc-body{border-top:1px solid var(--border);padding:14px 16px;display:none}
.hc-body.open{display:block}
.hc-ex-name{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.set-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.set-chip{
  padding:4px 9px;border-radius:7px;font-size:11px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text3);
}
.set-chip.done{background:var(--day-color-bg);border-color:var(--day-color-dim);color:var(--text2)}
.session-note-display{
  margin-top:4px;padding:8px 12px;background:var(--surface2);
  border-radius:8px;font-size:12px;color:#777;font-style:italic;
}
.pr-card{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
}
.pr-icon{
  width:38px;height:38px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:var(--day-color-bg);
}
.pr-name{font-family:var(--font-display);font-size:14px;font-weight:700}
.pr-sub{font-size:10px;color:var(--text3);margin-top:1px}
.pr-weight{font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--day-color)}
.pr-unit{font-size:11px;color:var(--text3);font-family:var(--font-body)}
.empty-state{text-align:center;color:var(--text4);padding:60px 0;font-size:14px;line-height:2}

/* ── Video Modal ── */
#video-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:9999;align-items:center;justify-content:center;padding:16px;
}
#video-modal.open{display:flex}
.vm-inner{width:100%;max-width:600px;background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid #333}
.vm-header{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.vm-title-label{font-size:9px;color:#555;letter-spacing:.14em;text-transform:uppercase}
.vm-title-name{font-family:var(--font-display);font-size:16px;font-weight:700;margin-top:2px}
.vm-close{
  width:32px;height:32px;border-radius:50%;background:#222;border:none;
  color:#888;font-size:20px;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.vm-video{position:relative;padding-bottom:56.25%;height:0}
.vm-video iframe{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── Bottom Nav ── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:rgba(13,13,13,.95);border-top:1px solid var(--border);
  display:flex;backdrop-filter:blur(12px);
  padding-bottom:var(--safe-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 0;background:none;border:none;color:var(--text4);
  font-family:var(--font-display);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  transition:color .2s;
}
.nav-btn.active{color:var(--day-color)}
.nav-icon{font-size:20px;line-height:1}

/* ── Install Banner ── */
#install-banner{
  display:none;position:fixed;bottom:calc(60px + var(--safe-bottom));
  left:16px;right:16px;z-index:300;
  background:#1a1a1a;border:1px solid #333;border-radius:14px;
  padding:14px 16px;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
#install-banner.show{display:flex}
.install-icon{width:44px;height:44px;border-radius:10px;background:#FF4D4D22;
  border:1px solid #FF4D4D44;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.install-text{flex:1}
.install-title{font-family:var(--font-display);font-size:14px;font-weight:700}
.install-sub{font-size:11px;color:#666;margin-top:2px}
#install-btn{
  background:#FF4D4D;border:none;color:#000;
  border-radius:8px;padding:8px 14px;
  font-family:var(--font-display);font-size:13px;font-weight:700;
  letter-spacing:.04em;white-space:nowrap;flex-shrink:0;
}
#install-dismiss{
  position:absolute;top:8px;right:10px;background:none;border:none;
  color:#444;font-size:18px;cursor:pointer;
}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="topbar-inner">
      <div id="topbar-row">
        <div>
          <div style="font-size:10px;color:#444;letter-spacing:.2em;text-transform:uppercase" id="today-label"></div>
          <div class="app-title">IRON<span id="title-accent">LOG</span></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="back-btn" onclick="showView('prs')" style="padding:7px 11px;font-size:12px">🏆 PRs</button>
          <button class="back-btn" onclick="showView('history')" style="padding:7px 11px;font-size:12px">📅 Log</button>
        </div>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
    </div>
  </div>

  <div id="content">
    <div class="max-w" id="view-workout"><!-- injected --></div>
    <div class="max-w" id="view-history" style="display:none"></div>
    <div class="max-w" id="view-prs" style="display:none"></div>
  </div>
</div>

<!-- Video Modal -->
<div id="video-modal" onclick="closeVideo(event)">
  <div class="vm-inner" onclick="event.stopPropagation()">
    <div class="vm-header">
      <div>
        <div class="vm-title-label">Form Tutorial</div>
        <div class="vm-title-name" id="vm-name"></div>
      </div>
      <button class="vm-close" onclick="closeVideo()">×</button>
    </div>
    <div class="vm-video"><iframe id="vm-iframe" frameborder="0" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>
  </div>
</div>

<!-- Install Banner -->
<div id="install-banner">
  <div class="install-icon">🏋️</div>
  <div class="install-text">
    <div class="install-title">Add to Home Screen</div>
    <div class="install-sub">Install IronLog for offline use</div>
  </div>
  <button id="install-btn" onclick="triggerInstall()">Install</button>
  <button id="install-dismiss" onclick="dismissInstall()">×</button>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const PLAN = [
  {
    id:'chest',day:'Day 1',label:'Monday',focus:'Chest',
    color:'#FF4D4D',icon:'🫀',
    note:'Push focus — upper & lower chest twice',
    exercises:[
      {id:'bench_press',name:'Flat Barbell Bench Press',sets:4,reps:'8–10',rest:'60s',round:1,videoId:'4Y2ZdHCOXok'},
      {id:'incline_db_press',name:'Incline Dumbbell Press',sets:3,reps:'10–12',rest:'45s',round:1,videoId:'kydayEMT-LQ'},
      {id:'cable_flye',name:'Cable Chest Flye (Mid)',sets:3,reps:'12–15',rest:'45s',round:2,videoId:'85HRhEE2k6s'},
      {id:'decline_pushup',name:'Decline Push-Ups',sets:3,reps:'15–20',rest:'30s',round:2,videoId:'SKPab2YC8BE'},
    ]
  },
  {
    id:'back',day:'Day 2',label:'Tuesday',focus:'Back',
    color:'#4D9FFF',icon:'🏋️',
    note:'Pull focus — lats & rhomboids from two angles',
    exercises:[
      {id:'deadlift',name:'Deadlift',sets:4,reps:'6–8',rest:'90s',round:1,videoId:'op9kVnSso6Q'},
      {id:'bb_row',name:'Bent-Over Barbell Row',sets:3,reps:'8–10',rest:'60s',round:1,videoId:'FWJR5Ve8bnQ'},
      {id:'lat_pulldown',name:'Lat Pulldown (Wide Grip)',sets:3,reps:'10–12',rest:'45s',round:2,videoId:'CAwf7n6Luuc'},
      {id:'seated_cable_row',name:'Seated Cable Row',sets:3,reps:'12–15',rest:'45s',round:2,videoId:'GZbfZ033f74'},
    ]
  },
  {
    id:'legs',day:'Day 3',label:'Wednesday',focus:'Legs',
    color:'#4DCC88',icon:'🦵',
    note:'Quad & hamstring double stimulus in 45 min',
    exercises:[
      {id:'squat',name:'Barbell Back Squat',sets:4,reps:'8–10',rest:'60s',round:1,videoId:'Uv_DKDl7EjA'},
      {id:'rdl',name:'Romanian Deadlift',sets:3,reps:'10–12',rest:'60s',round:1,videoId:'JCXUYuzwNrM'},
      {id:'leg_press',name:'Leg Press',sets:3,reps:'12–15',rest:'45s',round:2,videoId:'IZxyjW7MPJQ'},
      {id:'leg_curl',name:'Lying Leg Curl',sets:3,reps:'12–15',rest:'45s',round:2,videoId:'1Tq3QdYUuHs'},
    ]
  },
  {
    id:'shoulders',day:'Day 4',label:'Thursday',focus:'Shoulders',
    color:'#FFB84D',icon:'💪',
    note:'Front & lateral delts hit twice',
    exercises:[
      {id:'db_ohp',name:'Seated DB Overhead Press',sets:4,reps:'8–10',rest:'60s',round:1,videoId:'qEwKCR5JCog'},
      {id:'lateral_raise',name:'Lateral Raises',sets:3,reps:'12–15',rest:'30s',round:1,videoId:'XPPfnSEATJA'},
      {id:'arnold_press',name:'Arnold Press',sets:3,reps:'10–12',rest:'45s',round:2,videoId:'6Z15_WdXmVw'},
      {id:'cable_lateral',name:'Cable Lateral Raise',sets:3,reps:'15–20',rest:'30s',round:2,videoId:'PPpLNnBkTDw'},
    ]
  },
  {
    id:'arms',day:'Day 5',label:'Friday',focus:'Arms',
    color:'#B84DFF',icon:'🔥',
    note:'Biceps & triceps each hit twice',
    exercises:[
      {id:'bb_curl',name:'Barbell Curl',sets:3,reps:'10–12',rest:'45s',round:1,videoId:'kwG2ipFRgfo'},
      {id:'skull_crusher',name:'Skull Crushers',sets:3,reps:'10–12',rest:'45s',round:1,videoId:'d_KZxkY_5cM'},
      {id:'incline_db_curl',name:'Incline DB Curl',sets:3,reps:'12–15',rest:'30s',round:2,videoId:'soxrZlIl35U'},
      {id:'rope_pushdown',name:'Tricep Pushdown (Rope)',sets:3,reps:'12–15',rest:'30s',round:2,videoId:'vB5OHsJ3EME'},
    ]
  }
];

// ── State ─────────────────────────────────────────────────────────────────────
let activeDay = 0;
let currentView = 'workout';
let historyFilter = 'all';

function todayKey(){return new Date().toISOString().split('T')[0]}
function sessionKey(planId){return `session_${todayKey()}_${planId}`}

function loadSession(planId){
  try{return JSON.parse(localStorage.getItem(sessionKey(planId)))||{exercises:{},note:'',finished:false}}
  catch{return{exercises:{},note:'',finished:false}}
}
function saveSession(planId,data){
  localStorage.setItem(sessionKey(planId),JSON.stringify(data));
}
function loadHistory(){
  try{return JSON.parse(localStorage.getItem('workout_history'))||{}}
  catch{return{}}
}
function saveHistory(h){localStorage.setItem('workout_history',JSON.stringify(h))}

function getExData(session, exId, numSets){
  if(session.exercises[exId]) return session.exercises[exId];
  const sets = Array.from({length:numSets},(_,i)=>({idx:i,weight:'',reps:'',done:false}));
  return {sets};
}

// ── CSS vars per day ───────────────────────────────────────────────────────────
function applyDayColors(color){
  const r = document.documentElement;
  r.style.setProperty('--day-color', color);
  r.style.setProperty('--day-color-dim', color+'44');
  r.style.setProperty('--day-color-bg', color+'18');
  r.style.setProperty('--day-color-bg2', color+'0a');
  r.style.setProperty('--day-color-glow', color+'88');
  document.querySelector('meta[name=theme-color]').content = '#0D0D0D';
  document.getElementById('title-accent').style.color = color;
}

// ── Render Tabs ────────────────────────────────────────────────────────────────
function renderTabs(){
  const c = document.getElementById('day-tabs');
  c.innerHTML = PLAN.map((p,i)=>`
    <button class="day-tab ${i===activeDay?'active':''}" onclick="setDay(${i})" style="${i===activeDay?'--day-color:'+p.color:''}">
      <span class="tab-icon">${p.icon}</span>
      <span class="tab-num">${p.day.split(' ')[1]}</span>
      <span class="tab-name">${p.focus}</span>
    </button>`).join('');
}

// ── Render Workout ─────────────────────────────────────────────────────────────
function renderWorkout(){
  const plan = PLAN[activeDay];
  const session = loadSession(plan.id);
  applyDayColors(plan.color);

  const totalSets = plan.exercises.reduce((a,e)=>a+e.sets,0);
  const doneSets = Object.values(session.exercises)
    .reduce((a,ex)=>a+(ex.sets||[]).filter(s=>s.done).length,0);
  const pct = Math.round((doneSets/totalSets)*100)||0;

  const roundHTML = (round)=>{
    const exs = plan.exercises.filter(e=>e.round===round);
    return `
      <div class="round-header">
        <span class="round-label">Round ${round} — ${round===1?'Compound':'Isolation'}</span>
        <div class="round-line"></div>
      </div>
      ${exs.map(ex=>{
        const exData = getExData(session,ex.id,ex.sets);
        const done = exData.sets.filter(s=>s.done).length;
        const complete = done===ex.sets;
        return `
          <div class="ex-card ${complete?'complete':''}" id="ex-${ex.id}">
            <div class="ex-thumb" onclick="openVideo('${ex.videoId}','${ex.name.replace(/'/g,"\\'")}')">
              <img src="https://img.youtube.com/vi/${ex.videoId}/mqdefault.jpg" alt="${ex.name}" loading="lazy"/>
              <div class="thumb-overlay">
                <div class="play-btn" style="background:${plan.color}cc">▶</div>
                <span class="watch-label">Watch Form</span>
              </div>
              <div class="sets-badge" style="color:${complete?plan.color:'#777'}">${done}/${ex.sets} sets</div>
            </div>
            <div class="ex-body">
              <div class="ex-name">${ex.name} ${complete?'✅':''}</div>
              <div class="ex-meta">${ex.sets} sets · ${ex.reps} reps · ${ex.rest} rest</div>
              <div class="sets-headers">
                <div class="sets-header" style="flex:1">Weight</div>
                <div class="sets-header" style="flex:1">Reps</div>
                <div style="width:30px"></div>
              </div>
              ${exData.sets.map((s,i)=>`
                <div class="set-row">
                  <div class="set-num">${i+1}</div>
                  <input class="set-input" type="number" placeholder="kg" value="${s.weight}"
                    inputmode="decimal"
                    onchange="updateSet('${plan.id}','${ex.id}',${i},'weight',this.value)"/>
                  <input class="set-input" type="number" placeholder="reps" value="${s.reps}"
                    inputmode="numeric"
                    onchange="updateSet('${plan.id}','${ex.id}',${i},'reps',this.value)"/>
                  <button class="set-check ${s.done?'done':''}"
                    onclick="toggleSet('${plan.id}','${ex.id}',${i})"
                    style="${s.done?'background:'+plan.color+'33;border:1px solid '+plan.color+'66':''}"
                  >${s.done?`<span style="color:${plan.color}">✓</span>`:'<span style="color:#333">○</span>'}</button>
                </div>`).join('')}
            </div>
          </div>`;
      }).join('')}`;
  };

  document.getElementById('view-workout').innerHTML = `
    <div class="session-header">
      <div class="sh-row">
        <div class="sh-icon">${plan.icon}</div>
        <div>
          <div>
            <span class="sh-title">${plan.label}</span>
            <span class="sh-badge">${plan.focus.toUpperCase()}</span>
            ${session.finished?'<span class="sh-badge" style="background:#1a2a1a;color:#4DCC88">DONE</span>':''}
          </div>
          <div class="sh-note">${plan.note}</div>
        </div>
      </div>
      <div class="progress-label">
        <span>Session Progress</span>
        <span style="color:${plan.color}">${doneSets}/${totalSets} sets · ${pct}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${plan.color}99,${plan.color})"></div>
      </div>
    </div>

    ${roundHTML(1)}
    ${roundHTML(2)}

    <div class="notes-section">
      <div class="section-label">Session Notes</div>
      <textarea class="notes-input" rows="3" placeholder="How did the session feel? PRs? Form notes…"
        onchange="updateNote('${plan.id}',this.value)">${session.note||''}</textarea>
    </div>

    <button class="finish-btn" id="finish-btn"
      style="background:${pct===100?plan.color:plan.color+'33'};color:${pct===100?'#000':plan.color}"
      onclick="finishWorkout('${plan.id}')">
      ${session.finished?'✅ Update Session': pct===100?'🎉 Finish & Save Workout':`Save Progress (${pct}%)`}
    </button>
    <div class="save-toast" id="save-toast">✅ Workout saved!</div>
  `;
}

// ── Set updates ────────────────────────────────────────────────────────────────
function updateSet(planId, exId, idx, field, val){
  const s = loadSession(planId);
  const plan = PLAN.find(p=>p.id===planId);
  const ex = plan.exercises.find(e=>e.id===exId);
  if(!s.exercises[exId]) s.exercises[exId] = getExData(s,exId,ex.sets);
  s.exercises[exId].sets[idx][field] = val;
  saveSession(planId,s);
}

function toggleSet(planId, exId, idx){
  const s = loadSession(planId);
  const plan = PLAN.find(p=>p.id===planId);
  const ex = plan.exercises.find(e=>e.id===exId);
  if(!s.exercises[exId]) s.exercises[exId] = getExData(s,exId,ex.sets);
  s.exercises[exId].sets[idx].done = !s.exercises[exId].sets[idx].done;
  saveSession(planId,s);
  renderWorkout();
}

function updateNote(planId, val){
  const s = loadSession(planId);
  s.note = val;
  saveSession(planId,s);
}

function finishWorkout(planId){
  const s = loadSession(planId);
  const plan = PLAN.find(p=>p.id===planId);
  const note = document.querySelector('.notes-input');
  if(note) s.note = note.value;
  s.finished = true;
  s.finishedAt = new Date().toISOString();
  saveSession(planId,s);

  const h = loadHistory();
  h[`${todayKey()}_${planId}`] = {...s, planId, date: todayKey()};
  saveHistory(h);

  const t = document.getElementById('save-toast');
  if(t){t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
  renderWorkout();
}

// ── History ────────────────────────────────────────────────────────────────────
function renderHistory(){
  const h = loadHistory();
  const entries = Object.entries(h).sort(([a],[b])=>b.localeCompare(a));
  const filtered = historyFilter==='all' ? entries : entries.filter(([,d])=>d.planId===historyFilter);

  const filterBtns = ['all',...PLAN.map(p=>p.id)].map(id=>{
    const p = PLAN.find(x=>x.id===id);
    return `<button class="filter-btn ${historyFilter===id?'active':''}"
      style="${historyFilter===id&&p?'--day-color:'+p.color:''}"
      onclick="setHistoryFilter('${id}')">${id==='all'?'All':p.focus}</button>`;
  }).join('');

  const cards = filtered.length===0
    ? `<div class="empty-state">No workouts logged yet.<br><small style="color:#333">Complete a session to see it here.</small></div>`
    : filtered.map(([key,session])=>{
        const plan = PLAN.find(p=>p.id===session.planId);
        if(!plan) return '';
        const total = plan.exercises.reduce((a,e)=>a+e.sets,0);
        const done = Object.values(session.exercises||{})
          .reduce((a,ex)=>a+(ex.sets||[]).filter(s=>s.done).length,0);
        const exRows = plan.exercises.map(ex=>{
          const exData = session.exercises?.[ex.id]||{sets:[]};
          if(!exData.sets.some(s=>s.done)) return '';
          const chips = exData.sets.map((s,i)=>`
            <span class="set-chip ${s.done?'done':''}">${s.done?(s.weight||'–')+'kg×'+(s.reps||'–'):'–'}</span>`).join('');
          return `<div class="hc-ex-name">${ex.name}</div><div class="set-chips">${chips}</div>`;
        }).join('');
        return `
          <div class="history-card">
            <div class="hc-header" onclick="toggleHistory('${key}')">
              <div class="hc-icon" style="background:${plan.color}18;border:1px solid ${plan.color}33">${plan.icon}</div>
              <div class="hc-info">
                <div class="hc-name">${plan.focus} Day</div>
                <div class="hc-date">${session.date}</div>
              </div>
              <div class="hc-sets">
                <div class="hc-sets-count" style="color:${plan.color}">${done}/${total}</div>
                <div class="hc-sets-label">sets done</div>
              </div>
              <span style="color:#444;font-size:11px;margin-left:6px" id="arr-${key}">▼</span>
            </div>
            <div class="hc-body" id="hb-${key}">
              ${exRows||'<div style="color:#444;font-size:12px">No sets logged.</div>'}
              ${session.note?`<div class="session-note-display">📝 ${session.note}</div>`:''}
            </div>
          </div>`;
      }).join('');

  document.getElementById('view-history').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <button class="back-btn" onclick="showView('workout')">← Back</button>
      <span class="view-title">Workout Log</span>
    </div>
    <div class="filter-bar">${filterBtns}</div>
    ${cards}
  `;
}

function toggleHistory(key){
  const b = document.getElementById('hb-'+key);
  const a = document.getElementById('arr-'+key);
  if(!b) return;
  const open = b.classList.toggle('open');
  if(a) a.textContent = open?'▲':'▼';
}

function setHistoryFilter(id){
  historyFilter = id;
  renderHistory();
}

// ── PRs ────────────────────────────────────────────────────────────────────────
function renderPRs(){
  const h = loadHistory();
  const prs = {};
  Object.values(h).forEach(session=>{
    const plan = PLAN.find(p=>p.id===session.planId);
    if(!plan) return;
    plan.exercises.forEach(ex=>{
      const sets = (session.exercises?.[ex.id]?.sets||[]).filter(s=>s.done&&s.weight);
      sets.forEach(s=>{
        const w = parseFloat(s.weight);
        if(!isNaN(w)&&(!prs[ex.id]||w>prs[ex.id].weight))
          prs[ex.id]={weight:w,ex,plan};
      });
    });
  });

  const blocks = PLAN.map(plan=>{
    const planPRs = plan.exercises.map(ex=>prs[ex.id]?{ex,pr:prs[ex.id]}:null).filter(Boolean);
    if(!planPRs.length) return '';
    return `
      <div style="margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;
          font-family:var(--font-display);font-size:11px;letter-spacing:.15em;
          text-transform:uppercase;color:${plan.color}">
          <span>${plan.icon}</span><span>${plan.focus}</span>
          <div style="flex:1;height:1px;background:#222"></div>
        </div>
        ${planPRs.map(({ex,pr})=>`
          <div class="pr-card" style="--day-color:${plan.color};--day-color-bg:${plan.color}18">
            <div class="pr-icon">🏆</div>
            <div style="flex:1">
              <div class="pr-name">${ex.name}</div>
              <div class="pr-sub">${ex.reps} target reps</div>
            </div>
            <div>
              <span class="pr-weight">${pr.weight}</span>
              <span class="pr-unit"> kg</span>
            </div>
          </div>`).join('')}
      </div>`;
  }).join('');

  document.getElementById('view-prs').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="back-btn" onclick="showView('workout')">← Back</button>
      <span class="view-title">Personal Records 🏆</span>
    </div>
    ${Object.keys(prs).length===0
      ? '<div class="empty-state">No records yet.<br><small style="color:#333">Log weights during workouts to track your PRs.</small></div>'
      : blocks}
  `;
}

// ── View routing ───────────────────────────────────────────────────────────────
function showView(v){
  currentView = v;
  ['workout','history','prs'].forEach(name=>{
    document.getElementById('view-'+name).style.display = name===v?'block':'none';
  });
  if(v==='history') renderHistory();
  if(v==='prs') renderPRs();
  document.getElementById('content').scrollTop = 0;
}

function setDay(i){
  activeDay = i;
  renderTabs();
  renderWorkout();
  showView('workout');
}

// ── Video ──────────────────────────────────────────────────────────────────────
function openVideo(id, name){
  document.getElementById('vm-name').textContent = name;
  document.getElementById('vm-iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  document.getElementById('video-modal').classList.add('open');
}
function closeVideo(e){
  if(e && e.target !== document.getElementById('video-modal')) return;
  document.getElementById('video-modal').classList.remove('open');
  document.getElementById('vm-iframe').src = '';
}

// ── PWA Install ────────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  if(!localStorage.getItem('install_dismissed'))
    document.getElementById('install-banner').classList.add('show');
});
function triggerInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    document.getElementById('install-banner').classList.remove('show');
  });
}
function dismissInstall(){
  localStorage.setItem('install_dismissed','1');
  document.getElementById('install-banner').classList.remove('show');
}

// ── PWA Manifest (inline) ──────────────────────────────────────────────────────
const manifest = {
  name: 'IronLog',
  short_name: 'IronLog',
  description: '5-Day Double Stimulus Workout Tracker',
  start_url: '/index.html',
  display: 'standalone',
  background_color: '#0D0D0D',
  theme_color: '#0D0D0D',
  orientation: 'portrait',
  icons: [
    {src: generateIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any maskable'},
    {src: generateIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable'},
  ]
};
function generateIcon(size){
  const c = document.createElement('canvas');
  c.width=c.height=size;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,'#1a1a1a');g.addColorStop(1,'#0D0D0D');
  ctx.fillStyle=g;ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#FF4D4D';
  ctx.font=`bold ${size*.45}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏋️',size/2,size/2);
  return c.toDataURL('image/png');
}
const mBlob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
document.getElementById('manifest-link').href = URL.createObjectURL(mBlob);

// ── Service Worker ─────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode = `
const CACHE = 'ironlog-v1';
const ASSETS = ['/'];
self.addEventListener('install', e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net = fetch(e.request).then(res=>{
        if(res&&res.status===200&&res.type==='basic'){
          const c=res.clone();
          caches.open(CACHE).then(cache=>cache.put(e.request,c));
        }
        return res;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});`;
  const swBlob = new Blob([swCode],{type:'text/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── Init ───────────────────────────────────────────────────────────────────────
document.getElementById('today-label').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

// Set active day based on current weekday (Mon=0...Fri=4)
const dow = new Date().getDay(); // 0=Sun,1=Mon,...,5=Fri,6=Sat
if(dow>=1&&dow<=5) activeDay=dow-1;

renderTabs();
renderWorkout();
</script>
